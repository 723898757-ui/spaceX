<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 spaceX — 人类与AI的共同成长日记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 背景层级 - 8px 递增 */
      --bg-deep: #0B1120;
      --bg-card: #111827;
      --bg-elevated: #1A1F2E;
      --bg-hover: #242B3D;
      
      /* 强调色 */
      --accent-blue: #38BDF8;
      --accent-cyan: #06B6D4;
      --accent-purple: #A78BFA;
      --accent-amber: #F59E0B;
      
      /* 文字层级 - 对比度优化 */
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-tertiary: #64748B;
      --text-muted: #475569;
      
      /* 边框层级 */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --border-active: rgba(56, 189, 248, 0.3);
      
      /* 光晕效果 */
      --glow-blue: 0 0 40px rgba(56, 189, 248, 0.15);
      --glow-cyan: 0 0 40px rgba(6, 182, 212, 0.15);
    }

    body {
      font-family: 'Outfit', 'Noto Serif SC', -apple-system, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 动态背景 */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(192, 132, 252, 0.05) 0%, transparent 40%),
        radial-gradient(ellipse 50% 30% at 20% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 40%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    /* 网格纹理 */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.03;
      background-image: 
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* 光晕效果 */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb-1 {
      width: 600px;
      height: 600px;
      background: rgba(59, 130, 246, 0.15);
      top: -200px;
      right: -200px;
      animation: orbFloat1 15s ease-in-out infinite;
    }

    .glow-orb-2 {
      width: 400px;
      height: 400px;
      background: rgba(192, 132, 252, 0.1);
      bottom: -100px;
      left: -100px;
      animation: orbFloat2 18s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-50px, 30px) scale(1.1); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -30px) scale(0.9); }
    }

    /* 导航栏 */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(10, 14, 26, 0.9) 0%, transparent 100%);
      backdrop-filter: blur(20px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo-svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
      animation: logoPulse 3s ease-in-out infinite;
    }

    /* 天气组件样式 */
    .weather-widget {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 16px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 400;
      transition: all 0.3s ease;
    }

    .weather-widget:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .weather-icon {
      font-size: 16px;
    }

    .weather-temp {
      color: var(--text-primary);
      font-weight: 500;
    }

    .weather-city {
      color: var(--text-secondary);
      font-size: 12px;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .weather-widget {
        display: none;
      }
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 16px rgba(59, 130, 246, 0.5)); transform: scale(1.02); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-blue);
      transition: width 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--text-primary);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* 主内容区 */
    main {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 120px 24px 80px;
    }

    /* 标题区域 */
    .hero-content {
      text-align: center;
      max-width: 800px;
      margin-bottom: 60px;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      font-size: 13px;
      color: var(--accent-blue);
      margin-bottom: 32px;
      font-weight: 500;
    }

    .hero-badge::before {
      content: '🚀';
      font-size: 12px;
    }

    h1 {
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 24px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 20px;
      color: var(--text-secondary);
      font-weight: 400;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* 输入框容器 */
    .input-container {
      width: 100%;
      max-width: 720px;
      position: relative;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .input-wrapper {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 6px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 
        0 0 0 1px rgba(56, 189, 248, 0.3),
        0 20px 60px rgba(56, 189, 248, 0.15);
      background: var(--bg-elevated);
    }

    /* 模型选择器 */
    .model-selector {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }

    .model-dropdown {
      position: relative;
    }

    .model-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    .model-trigger:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-hover);
    }

    .model-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .model-icon.gpt {
      background: linear-gradient(135deg, #10a37f 0%, #0d8c6d 100%);
    }

    .model-icon.claude {
      background: linear-gradient(135deg, #d97757 0%, #c4694a 100%);
    }

    .model-icon.gemini {
      background: linear-gradient(135deg, #4285f4 0%, #34a853 50%, #fbbc04 100%);
    }

    .model-icon.deepseek {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }

    .dropdown-arrow {
      width: 16px;
      height: 16px;
      opacity: 0.5;
      transition: transform 0.3s ease;
    }

    .model-dropdown.active .dropdown-arrow {
      transform: rotate(180deg);
    }

    .model-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: rgba(15, 23, 41, 0.98);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 8px;
      min-width: 220px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.5);
    }

    .model-dropdown.active .model-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .model-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .model-option:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .model-option.active {
      background: rgba(59, 130, 246, 0.15);
    }

    .model-info {
      flex: 1;
    }

    .model-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .model-desc {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .model-check {
      width: 18px;
      height: 18px;
      opacity: 0;
      color: var(--accent-blue);
    }

    .model-option.active .model-check {
      opacity: 1;
    }

    /* 输入框 */
    .chat-input {
      width: 100%;
      padding: 18px 140px 18px 140px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      min-height: 64px;
      max-height: 200px;
      line-height: 1.6;
    }

    .chat-input::placeholder {
      color: var(--text-tertiary);
    }

    /* 快捷操作 */
    .quick-actions {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 1s ease-out 0.4s both;
    }

    .quick-action {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .quick-action:hover {
      background: var(--bg-elevated);
      border-color: var(--border-active);
      color: var(--text-primary);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(56, 189, 248, 0.15);
    }

    .quick-action svg {
      width: 20px;
      height: 20px;
      opacity: 0.8;
      transition: all 0.3s ease;
    }

    .quick-action:hover svg {
      opacity: 1;
      color: var(--accent-blue);
    }

    /* 最近日记 */
    .recent-section {
      margin-top: 80px;
      text-align: center;
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .recent-title {
      font-size: 14px;
      color: var(--text-tertiary);
      margin-bottom: 24px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .article-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    .article-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
    }

    .article-item:hover {
      background: var(--bg-elevated);
      border-color: var(--border-active);
      transform: translateX(6px);
      box-shadow: 0 8px 32px rgba(56, 189, 248, 0.1);
    }

    .article-day {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.1);
      padding: 4px 10px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .article-title-text {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      text-align: left;
    }

    .article-date {
      font-size: 13px;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    /* 页脚 */
    footer {
      position: relative;
      z-index: 10;
      padding: 40px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      margin: 0 16px;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: var(--text-primary);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      nav {
        padding: 16px 24px;
      }

      .nav-links {
        display: none;
      }

      h1 {
        font-size: 36px;
      }

      .chat-input {
        padding: 16px 60px 16px 16px;
      }

      .model-selector {
        position: relative;
        left: auto;
        top: auto;
        transform: none;
        margin-bottom: 8px;
        padding: 0 6px;
      }

      .model-trigger {
        width: 100%;
        justify-content: space-between;
      }

      .input-wrapper {
        padding: 12px;
      }

      .send-btn {
        right: 8px;
        width: 40px;
        height: 40px;
      }

      .article-item {
        flex-wrap: wrap;
      }

      .article-date {
        width: 100%;
        text-align: left;
        padding-left: 60px;
      }
    }
  </style>
</head>

  <script>
    // ========== 天气组件 ==========
    async function fetchWeather() {
      try {
        // 获取位置
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
        });
        
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        // 使用 wttr.in API (免费，无需 key)
        const response = await fetch(`https://wttr.in/${lat},${lon}?format=j1`);
        const data = await response.json();
        
        if (data.current_condition && data.current_condition[0]) {
          const current = data.current_condition[0];
          const temp = current.temp_C;
          const weatherCode = current.weatherCode;
          const city = data.nearest_area?.[0]?.areaName?.[0]?.value || data.nearest_area?.[0]?.region?.[0]?.value || '当地';
          
          // 根据天气码显示图标
          const weatherIcon = getWeatherIcon(weatherCode);
          
          document.getElementById('weatherIcon').textContent = weatherIcon;
          document.getElementById('weatherTemp').textContent = temp + '°';
          document.getElementById('weatherCity').textContent = city;
        }
      } catch (error) {
        console.log('天气获取失败:', error);
        // Fallback: 使用 IP 定位
        try {
          const response = await fetch('https://wttr.in/?format=j1');
          const data = await response.json();
          if (data.current_condition && data.current_condition[0]) {
            const current = data.current_condition[0];
            const temp = current.temp_C;
            const weatherCode = current.weatherCode;
            const city = data.nearest_area?.[0]?.areaName?.[0]?.value || '当地';
            
            document.getElementById('weatherIcon').textContent = getWeatherIcon(weatherCode);
            document.getElementById('weatherTemp').textContent = temp + '°';
            document.getElementById('weatherCity').textContent = city;
          }
        } catch (e) {
          document.getElementById('weatherCity').textContent = '天气';
        }
      }
    }

    function getWeatherIcon(code) {
      const icons = {
        '113': '☀️', '116': '⛅', '119': '☁️', '122': '☁️',
        '143': '🌫️', '176': '🌦️', '179': '🌨️', '182': '🌨️',
        '185': '🌨️', '200': '⛈️', '227': '🌨️', '230': '❄️',
        '248': '🌫️', '260': '🌫️', '263': '🌧️', '266': '🌧️',
        '281': '🌨️', '284': '🌨️', '293': '🌧️', '296': '🌧️',
        '299': '🌧️', '302': '🌧️', '305': '🌧️', '308': '🌧️',
        '311': '🌨️', '314': '🌨️', '317': '🌨️', '320': '🌨️',
        '323': '🌨️', '326': '🌨️', '329': '❄️', '332': '❄️',
        '335': '❄️', '338': '❄️', '350': '🌨️', '353': '🌧️',
        '356': '🌧️', '359': '🌧️', '362': '🌨️', '365': '🌨️',
        '368': '🌨️', '371': '❄️', '374': '🌨️', '377': '🌨️',
        '386': '⛈️', '389': '⛈️', '392': '⛈️', '395': '⛈️'
      };
      return icons[code] || '🌤️';
    }

    // 初始化天气
    fetchWeather();
    
    // 每 10 分钟刷新天气
    setInterval(fetchWeather, 600000);
  </script>
